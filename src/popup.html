<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lovable Info Extractor</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>Lovable Info Extractor</h1>
      <p class="hint">
        Open a logged-in <code>lovable.dev</code> tab, then run audit.
      </p>
      <label class="toggle">
        <input id="patchModeToggle" type="checkbox" />
        Patch mode: click "Scan" and "Try to fix all" when available
      </label>
      <div class="actions">
        <button id="runAudit" class="primary">Run Audit</button>
        <button id="pauseAudit" disabled>Pause</button>
        <button id="resumeAudit" disabled>Resume</button>
        <button id="stopAudit" disabled>Stop</button>
      </div>
      <p id="status" class="status">Idle</p>

      <section class="panel">
        <h2>Live Progress</h2>
        <pre id="progress">No live progress yet.</pre>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <pre id="summary">No run yet.</pre>
      </section>

      <div class="actions">
        <button id="downloadJson" disabled>Download JSON</button>
        <button id="downloadTargets" disabled>Download targets.txt</button>
      </div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
