<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lovable Info Extractor - Advanced Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="app">
      <h1>Advanced Settings</h1>
      <p class="hint">
        Configure advanced behavior here. Keep using the popup for quick runs.
      </p>

      <section class="panel">
        <h2>Parallel Project Inspection</h2>
        <label class="toggle">
          <input id="parallelProjectInspections" type="checkbox" />
          Enable parallel project inspections
        </label>

        <div id="parallelSettings" hidden>
          <label class="field" for="projectWorkerCount">Parallel workers</label>
          <select id="projectWorkerCount">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>

          <label class="toggle">
            <input id="groupProjectTabs" type="checkbox" />
            Group worker tabs in a browser tab group
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Navigation Timing</h2>
        <label class="field" for="pageLoadTimeoutSec">Page load timeout (seconds)</label>
        <input id="pageLoadTimeoutSec" type="number" min="0" max="600" step="1" />
        <p class="hint-inline">Set to <code>0</code> to use built-in defaults (30s general, 60s project pages).</p>
      </section>

      <section class="panel">
        <h2>Scan Triggering</h2>
        <label class="toggle">
          <input id="skipRecentScans" type="checkbox" />
          Skip clicking "Scan" for recently scanned projects
        </label>

        <div id="skipRecentSettings" hidden>
          <label class="field" for="recentScanSkipHours">Skip threshold (hours)</label>
          <input id="recentScanSkipHours" type="number" min="1" max="168" step="1" />
        </div>
      </section>

      <p id="saveState" class="save-state">Saved</p>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
